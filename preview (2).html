<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>아오키미 노래 소트 | あおキミうたソート</title>
<script type="text/javascript">
//*********************************************************
// 노래 리스트
//*********************************************************
var namMember = [
"<br>気付いてダンデライオン (눈치채줘 민들레)</br>",
"<br>Immature jewelry</br>",
"<br>碧空ストライプ (푸른 하늘 스트라이프)</br>",
"<br>ためらいハートビート (망설이는 하트비트)</br>",
"<br>きずなピース (인연의 조각)</br>",
"<br>真夜中少女 (한밤의 소녀)</br>",
"<br>キミに会えたら (너를 만날 수 있다면)</br>",
"<br>不器用 My love (서투른 My love)</br>",
"<br>蒼穹ラブレター (푸른 하늘의 러브레터)</br>",
"<br>青春色リマインド (청춘빛 리마인드)</br>",
"<br>絶対的SWEETIE♡ (절대적인 SWEETIE♡)</br>",
"<br>純情オフサイド (순정 오프사이드)</br>",
"<br>キミばかりアンソロジー (너만의 앤솔로지)</br>",
"<br>等身大シューティングスター (실물 크기 슈팅스타)</br>",
"<br>ぎゅっと！ (꽉!)</br>",
"<br>シュワラブ (슈와 러브)</br>",
"<br>のーてんきのススメ (천진난만 권유)</br>",
"<br>はじめて愛デビュー！ (처음 사랑 데뷔!)</br>",
"<br>ときめきイルミネイト (두근두근 일루미네이트)</br>",
"<br>ホワイトモノローグ (화이트 모놀로그)</br>",
"<br>ゆめいろキャンバス (꿈빛 캔버스)</br>"
];

var lstMember = new Array();
var parent = new Array();
var equal = new Array();
var rec = new Array();
var cmp1,cmp2;
var head1,head2;
var nrec;

var numQuestion;
var totalSize;
var finishSize;
var finishFlag;

function initList(){
    var n=0, mid, i;
    lstMember[n] = new Array();
    for(i=0;i<namMember.length;i++){ lstMember[n][i]=i; }
    parent[n]=-1; totalSize=0; n++;
    for(i=0;i<lstMember.length;i++){
        if(lstMember[i].length>=2){
            mid=Math.ceil(lstMember[i].length/2);
            lstMember[n]=lstMember[i].slice(0,mid); parent[n]=i; totalSize+=lstMember[n].length; n++;
            lstMember[n]=lstMember[i].slice(mid,lstMember[i].length); parent[n]=i; totalSize+=lstMember[n].length; n++;
        }
    }
    for(i=0;i<namMember.length;i++){ rec[i]=0; }
    nrec=0;
    for(i=0;i<=namMember.length;i++){ equal[i]=-1; }
    cmp1=lstMember.length-2; cmp2=lstMember.length-1; head1=0; head2=0; numQuestion=1; finishSize=0; finishFlag=0;
}

function sortList(flag){
    var i,str;
    if(flag<0){
        rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
    } else if(flag>0){
        rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    } else {
        rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
        equal[rec[nrec-1]]=lstMember[cmp2][head2];
        rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    }
    if(head1<lstMember[cmp1].length && head2==lstMember[cmp2].length){
        while(head1<lstMember[cmp1].length){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
    } else if(head1==lstMember[cmp1].length && head2<lstMember[cmp2].length){
        while(head2<lstMember[cmp2].length){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    }
    if(head1==lstMember[cmp1].length && head2==lstMember[cmp2].length){
        for(i=0;i<lstMember[cmp1].length+lstMember[cmp2].length;i++){ lstMember[parent[cmp1]][i]=rec[i]; }
        lstMember.pop(); lstMember.pop();
        cmp1-=2; cmp2-=2; head1=0; head2=0; for(i=0;i<namMember.length;i++){ rec[i]=0; } nrec=0;
    }
    if(cmp1<0){ str="Battle No."+(numQuestion-1)+"<br>"+Math.floor(finishSize*100/totalSize)+"% sorted."; document.getElementById("battleNumber").innerHTML=str; showResult(); finishFlag=1; }
    else{ showImage(); }
}

function showResult(){
    var ranking=1, sameRank=1, str="", i;
    str += "<table style=\"width:200px; font-size:12px; line-height:120%; margin-left:auto; margin-right:auto; border:1px solid #000; border-collapse:collapse\" align=\"center\">";
    str += "<tr><td style=\"color:#ffffff; background-color:#000; text-align:center;\">순위</td><td style=\"color:#ffffff; background-color:#000; text-align:center;\">이름</td></tr>";
    for(i=0;i<namMember.length;i++){
        str += "<tr><td style=\"border:1px solid #000; text-align:right; padding-right:5px;\">"+ranking+"</td><td style=\"border:1px solid #000; padding-left:5px;\">"+namMember[lstMember[0][i]]+"</td></tr>";
        if(i<namMember.length-1){ if(equal[lstMember[0][i]]==lstMember[0][i+1]){ sameRank++; } else { ranking+=sameRank; sameRank=1; } }
    }
    str+="</table>";
    document.getElementById("resultField").innerHTML=str;
}

function showImage(){
    var str0="Battle No."+numQuestion+"<br>"+Math.floor(finishSize*100/totalSize)+"% sorted.";
    var str1=""+toNameFace(lstMember[cmp1][head1]);
    var str2=""+toNameFace(lstMember[cmp2][head2]);
    document.getElementById("battleNumber").innerHTML=str0;
    document.getElementById("leftField").innerHTML=str1;
    document.getElementById("rightField").innerHTML=str2;
    numQuestion++;
}

function toNameFace(n){ return namMember[n]; }
</script>

<style>
body {
  margin: 0;
  padding: 0;
  background-color: #e6f2ff;
  font-family: '돋움', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  text-align: center;
}

h1 {
  font-size: 36px;
  color: #0b61f3;
  margin: 30px 10px 20px 10px;
  line-height: 1.2;
}

#middleContainer {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 0 10px;
}

#battleNumber {
  font-size: 22px;
  color: #000;
  margin-bottom: 20px;
  text-align: center;
}

#container {
  display: flex;
  justify-content: center;
  gap: 20px;
  width: 100%;
  max-width: 700px;
  margin-bottom: 20px;
}

#leftField, #rightField {
  flex: 1;
  height: 180px;
  background-color: #87CEFA;
  border: 1px solid #000;
  border-radius: 8px;
  font-size: 20px;
  font-weight: 600;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px;
  cursor: pointer;
  word-break: break-word;
  line-height: 1.3;
}

#btnContainer {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 40px;
}

#btnContainer button {
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background-color: #d0e7ff;
  cursor: pointer;
  font-weight: 600;
}

#resultField {
  text-align: center;
  font-size: 12px;
  color: #333;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<h1>아오키미 노래 소트<br>あおキミうたソート</h1>

<div id="middleContainer">
  <div id="battleNumber">&nbsp;</div>
  <div id="container">
    <div id="leftField" onClick="if(finishFlag==0)sortList(-1);">&nbsp;</div>
    <div id="rightField" onClick="if(finishFlag==0)sortList(1);">&nbsp;</div>
  </div>
  <div id="btnContainer">
    <button onClick="if(finishFlag==0)sortList(0);">둘 다 좋다</button>
    <button onClick="if(finishFlag==0)sortList(0);">모르겠다</button>
  </div>
</div>

<div id="resultField">
  문제 있을 시 게시 내리겠습니다!<br>
  問題がある場合は、投稿を削除します！
</div>

<script>
initList();
showImage();
</script>

</body>
</html>

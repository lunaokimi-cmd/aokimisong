<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>아오키미 노래 소트 | あおキミうたソート</title>
<style>
/* ===== 외관 스타일링 ===== */
body {
    font-family: 'Noto Sans KR', '돋움', sans-serif;
    font-size: 16px;
    background-color: #f0f8ff;
    color: #000;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    font-size: 28px;
    color: #1e90ff;
    margin-bottom: 20px;
}

#battleNumber {
    font-size: 16px;
    margin-bottom: 10px;
}

#mainTable {
    margin: 0 auto;
    border-collapse: separate;
    border-spacing: 10px 5px;
}

#leftField, #rightField {
    width: 140px;
    height: 150px;
    border: 1px solid #000;
    background-color: #87CEFA;
    font-size: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

.middleField {
    width: 140px;
    height: 70px;
    border: 1px solid #000;
    background-color: #E0FFFF;
    font-size: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

table {
    margin: 0 auto;
    border-collapse: collapse;
}

table th {
    background-color: #87CEFA;
    color: #000;
    border: 1px solid #000;
    padding: 8px;
    font-size: 16px;
}

table td {
    background-color: #E0FFFF;
    border: 1px solid #000;
    padding: 8px;
    font-size: 16px;
    text-align: center;
}

#resultField {
    margin-top: 30px;
}
</style>
</head>
<body>

<h1>아오키미 노래 소트 あおキミうたソート</h1>

<table id="mainTable">
<tr>
    <td id="battleNumber" colspan="3">&nbsp;</td>
</tr>
<tr>
    <td id="leftField" rowspan="2" onClick="if(finishFlag==0)sortList(-1);">&nbsp;</td>
    <td class="middleField" onClick="if(finishFlag==0)sortList(0);">둘 다 좋다</td>
    <td id="rightField" rowspan="2" onClick="if(finishFlag==0)sortList(1);">&nbsp;</td>
</tr>
<tr>
    <td class="middleField" onClick="if(finishFlag==0)sortList(0);">모르겠다</td>
</tr>
</table>

<div id="resultField">
    <p>문제 있을 시 게시 내리겠습니다!</p>
    <p>問題がある場合は、投稿を削除します！</p>
</div>

<script>
// ================= 기존 riff-sort 로직 =================
var namMember = [
"<br>気付いてダンデライオン (눈치채줘 민들레)</br>",
"<br>Immature jewelry</br>",
"<br>碧空ストライ프 (푸른 하늘 스트라이프)</br>",
"<br>ためらいハートビート (망설이는 하트비트)</br>",
"<br>きずなピース (인연의 조각)</br>",
"<br>真夜中少女 (한밤의 소녀)</br>",
"<br>キミに会えたら (너를 만날 수 있다면)</br>",
"<br>不器用 My love (서투른 My love)</br>",
"<br>蒼穹ラブレター (푸른 하늘의 러브레터)</br>",
"<br>青春色リマインド (청춘빛 리마인드)</br>",
"<br>絶対的SWEETIE♡ (절대적인 SWEETIE♡)</br>",
"<br>純情オフサイド (순정 오프사이드)</br>",
"<br>キミばかりアンソロジー (너만의 앤솔로지)</br>",
"<br>等身大シューティングスター (실물 크기 슈팅스타)</br>",
"<br>ぎゅっと！ (꽉!)</br>",
"<br>シュワラブ (슈와 러브)</br>",
"<br>のーてんきのススメ (천진난만 권유)</br>",
"<br>はじめて愛デビュー！ (처음 사랑 데뷔!)</br>",
"<br>ときめきイルミネイト (두근두근 일루미네이트)</br>",
"<br>ホワイトモノローグ (화이트 모놀로그)</br>",
"<br>ゆめいろキャンバス (꿈빛 캔버스)</br>"
];

var lstMember = [];
var parent = [];
var equal = [];
var rec = [];
var cmp1, cmp2;
var head1, head2;
var nrec;
var numQuestion;
var totalSize;
var finishSize;
var finishFlag;

function initList(){
    var n = 0;
    var mid;
    var i;

    lstMember[n] = new Array();
    for (i=0; i<namMember.length; i++) lstMember[n][i] = i;
    parent[n] = -1;
    totalSize = 0;
    n++;

    for (i=0; i<lstMember.length; i++){
        if(lstMember[i].length>=2){
            mid = Math.ceil(lstMember[i].length/2);
            lstMember[n] = lstMember[i].slice(0,mid);
            totalSize += lstMember[n].length;
            parent[n] = i;
            n++;
            lstMember[n] = lstMember[i].slice(mid,lstMember[i].length);
            totalSize += lstMember[n].length;
            parent[n] = i;
            n++;
        }
    }

    for (i=0; i<namMember.length; i++) rec[i] = 0;
    nrec = 0;

    for (i=0; i<=namMember.length; i++) equal[i] = -1;

    cmp1 = lstMember.length-2;
    cmp2 = lstMember.length-1;
    head1 = 0;
    head2 = 0;
    numQuestion = 1;
    finishSize = 0;
    finishFlag = 0;
}

function sortList(flag){
    var i;
    if (flag<0){
        rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
    } else if (flag>0){
        rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    } else {
        rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
        equal[rec[nrec-1]] = lstMember[cmp2][head2];
        rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    }

    if(head1<lstMember[cmp1].length && head2==lstMember[cmp2].length){
        while(head1<lstMember[cmp1].length){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
    } else if(head1==lstMember[cmp1].length && head2<lstMember[cmp2].length){
        while(head2<lstMember[cmp2].length){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    }

    if(head1==lstMember[cmp1].length && head2==lstMember[cmp2].length){
        for(i=0;i<lstMember[cmp1].length+lstMember[cmp2].length;i++){
            lstMember[parent[cmp1]][i]=rec[i];
        }
        lstMember.pop(); lstMember.pop();
        cmp1-=2; cmp2-=2;
        head1=0; head2=0;
        for(i=0;i<namMember.length;i++) rec[i]=0; nrec=0;
    }

    if(cmp1<0){
        document.getElementById("battleNumber").innerHTML = "Battle No."+(numQuestion-1)+"<br>"+Math.floor(finishSize*100/totalSize)+"% sorted.";
        showResult();
        finishFlag = 1;
    } else { showImage(); }
}

function showResult(){
    var ranking = 1;
    var sameRank = 1;
    var str="<table><tr><th>순위</th><th>이름</th></tr>";
    for(var i=0;i<namMember.length;i++){
        str+="<tr><td>"+ranking+"</td><td>"+namMember[lstMember[0][i]]+"</td></tr>";
        if(i<namMember.length-1){
            if(equal[lstMember[0][i]]==lstMember[0][i+1]) sameRank++;
            else{ ranking+=sameRank; sameRank=1; }
        }
    }
    str+="</table>";
    document.getElementById("resultField").innerHTML = str;
}

function showImage(){
    var str0 = "Battle No."+numQuestion+"<br>"+Math.floor(finishSize*100/totalSize)+"% sorted.";
    document.getElementById("battleNumber").innerHTML=str0;
    document.getElementById("leftField").innerHTML=toNameFace(lstMember[cmp1][head1]);
    document.getElementById("rightField").innerHTML=toNameFace(lstMember[cmp2][head2]);
    numQuestion++;
}

function toNameFace(n){ return namMember[n]; }

initList();
showImage();
</script>

</body>
</html>

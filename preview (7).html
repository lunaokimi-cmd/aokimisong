<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>아오키미 노래 소트 | あおキミうたソート</title>
<script type="text/javascript">
//*********************************************************
// 노래 리스트
//*********************************************************
var namMember = [
"<br>気付いてダンデライオン (눈치채줘 민들레)</br>",
"<br>Immature jewelry</br>",
"<br>碧空ストライ프 (푸른 하늘 스트라이프)</br>",
"<br>ためらいハートビート (망설이는 하트비트)</br>",
"<br>きずなピース (인연의 조각)</br>",
"<br>真夜中少女 (한밤의 소녀)</br>",
"<br>キミに会えたら (너를 만날 수 있다면)</br>",
"<br>不器用 My love (서투른 My love)</br>",
"<br>蒼穹ラブレター (푸른 하늘의 러브레터)</br>",
"<br>青春色リマインド (청춘빛 리마인드)</br>",
"<br>絶対적SWEETIE♡ (절대적인 SWEETIE♡)</br>",
"<br>純情オフサイド (순정 오프사이드)</br>",
"<br>キミばかりアンソロジー (너만의 앤솔로지)</br>",
"<br>等身大シューティングスター (실물 크기 슈팅스타)</br>",
"<br>ぎゅっと！ (꽉!)</br>",
"<br>シュワラブ (슈와 러브)</br>",
"<br>のーてんきのススメ (천진난만 권유)</br>",
"<br>はじめて愛デビュー！ (처음 사랑 데뷔!)</br>",
"<br>ときめきイルミネイト (두근두근 일루미네이트)</br>",
"<br>ホワイトモノローグ (화이트 모놀로그)</br>",
"<br>ゆめいろキャンバス (꿈빛 캔버스)</br>"
];

var lstMember=[], parent=[], equal=[], rec=[];
var cmp1, cmp2, head1, head2, nrec;
var numQuestion, totalSize, finishSize, finishFlag;

function initList(){
    var n=0, mid, i;
    lstMember[n]=[];
    for(i=0;i<namMember.length;i++) lstMember[n][i]=i;
    parent[n]=-1; totalSize=0; n++;
    for(i=0;i<lstMember.length;i++){
        if(lstMember[i].length>=2){
            mid=Math.ceil(lstMember[i].length/2);
            lstMember[n]=lstMember[i].slice(0,mid); parent[n]=i; totalSize+=lstMember[n].length; n++;
            lstMember[n]=lstMember[i].slice(mid); parent[n]=i; totalSize+=lstMember[n].length; n++;
        }
    }
    for(i=0;i<namMember.length;i++) rec[i]=0;
    nrec=0;
    for(i=0;i<=namMember.length;i++) equal[i]=-1;
    cmp1=lstMember.length-2; cmp2=lstMember.length-1; head1=head2=0;
    numQuestion=1; finishSize=0; finishFlag=0;
}

function sortList(flag){
    if(flag<0){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
    } else if(flag>0){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    } else {
        rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
        equal[rec[nrec-1]]=lstMember[cmp2][head2];
        rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while(equal[rec[nrec-1]]!=-1){ rec[nrec]=lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    }

    if(head1==lstMember[cmp1].length && head2==lstMember[cmp2].length){
        for(var i=0;i<lstMember[cmp1].length+lstMember[cmp2].length;i++) lstMember[parent[cmp1]][i]=rec[i];
        lstMember.pop(); lstMember.pop(); cmp1-=2; cmp2-=2; head1=head2=0; nrec=0;
    }
    if(cmp1<0){ document.getElementById("battleNumber").innerHTML="Battle No."+(numQuestion-1)+"<br>"+Math.floor(finishSize*100/totalSize)+"% sorted."; showResult(); finishFlag=1;}
    else showImage();
}

function showResult(){
    var str="<table style='width:90%;max-width:400px;margin:20px auto;border-collapse:collapse'><tr><td style='background:#000;color:#fff;text-align:center'>순위</td><td style='background:#000;color:#fff;text-align:center'>이름</td></tr>";
    var ranking=1, sameRank=1;
    for(var i=0;i<namMember.length;i++){
        str+="<tr><td style='border:1px solid #000;text-align:right;padding:5px'>"+ranking+"</td><td style='border:1px solid #000;padding-left:5px'>"+namMember[lstMember[0][i]]+"</td></tr>";
        if(i<namMember.length-1){ if(equal[lstMember[0][i]]==lstMember[0][i+1]) sameRank++; else { ranking+=sameRank; sameRank=1; } }
    }
    str+="</table>";
    document.getElementById("resultField").innerHTML=str;
}

function showImage(){
    document.getElementById("battleNumber").innerHTML="Battle No."+numQuestion+"<br>"+Math.floor(finishSize*100/totalSize)+"% sorted.";
    document.getElementById("leftField").innerHTML=toNameFace(lstMember[cmp1][head1]);
    document.getElementById("rightField").innerHTML=toNameFace(lstMember[cmp2][head2]);
    numQuestion++;
}

function toNameFace(n){ return namMember[n]; }
</script>

<style>
html, body {
    margin:0; padding:0; width:100%; height:100%; font-family:'돋움',sans-serif; background:#e6f2ff;
    display:flex; flex-direction:column;
}
header {text-align:center; font-size:calc(1.5em + 5vw); color:#0b61f3; margin-top:5vh; line-height:1.2;}
main {flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%;}
#battleNumber {font-size:5vw; color:#000; margin-bottom:3vh; text-align:center;}
#container {display:flex; justify-content:center; gap:5vw; width:90%; max-width:500px;}
#leftField, #rightField {
  flex:1; min-height:30vw; background:#87CEFA; border:1px solid #000; border-radius:8px;
  display:flex; justify-content:center; align-items:center; font-size:4vw; font-weight:600; padding:5px;
  cursor:pointer; text-align:center; word-break:break-word;
}
#btnContainer {display:flex; justify-content:center; gap:5vw; margin-top:3vh; width:90%; max-width:500px;}
#btnContainer button {flex:1; padding:3vw 5vw; font-size:4vw; border-radius:8px; border:none; background:#d0e7ff; cursor:pointer; font-weight:600;}
footer {text-align:center; font-size:4vw; margin:3vh 0 2vh 0;}
#resultField {margin-top:3vh; font-size:4vw; color:#333; text-align:center; width:90%; max-width:400px;}
@media(min-width:768px){
  #leftField, #rightField {font-size:20px; min-height:180px;}
  #btnContainer button {font-size:18px; padding:12px 24px;}
  #battleNumber {font-size:22px;}
  footer {font-size:16px;}
}
</style>
</head>
<body>

<header>아오키미 노래 소트<br>あおキミうたソート</header>

<main>
  <div id="battleNumber">&nbsp;</div>
  <div id="container">
    <div id="leftField" onClick="if(finishFlag==0)sortList(-1);">&nbsp;</div>
    <div id="rightField" onClick="if(finishFlag==0)sortList(1);">&nbsp;</div>
  </div>
  <div id="btnContainer">
    <button onClick="if(finishFlag==0)sortList(0);">둘 다 좋다</button>
    <button onClick="if(finishFlag==0)sortList(0);">모르겠다</button>
  </div>
</main>

<footer>
  문제 있을 시 게시 내리겠습니다!<br>
  問題がある場合は、投稿を削除します！
</footer>

<div id="resultField"></div>

<script>
initList();
showImage();
</script>

</body>
</html>

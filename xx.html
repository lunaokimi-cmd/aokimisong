<html lang="ja">
<head>
<meta http-equiv="Content-Style-Type" content="text/css">
<meta http-equiv="Content-Script-Type" content="text/javascript">
<title>아오키미 노래 소트 | あおキミうたソート</title>
<script type="text/javascript">
//*********************************************************
// 최애 정할 곡 리스트
var namMember = new Array(
"<br>気付いてダンデライオン (눈치채줘 민들레)</br>",
"<br>Immature jewelry</br>",
"<br>碧空ストライプ (푸른 하늘 스트라이프)</br>",
"<br>ためらいハートビート (망설이는 하트비트)</br>",
"<br>きずなピース (인연의 조각)</br>",
"<br>真夜中少女 (한밤의 소녀)</br>",
"<br>キミに会えたら (너를 만날 수 있다면)</br>",
"<br>不器用 My love (서투른 My love)</br>",
"<br>蒼穹ラブレター (푸른 하늘의 러브레터)</br>",
"<br>青春色リマインド (청춘빛 리마인드)</br>",
"<br>絶対的SWEETIE♡ (절대적인 SWEETIE♡)</br>",
"<br>純情オフサイド (순정 오프사이드)</br>",
"<br>キミばかりアンソロジー (너만의 앤솔로지)</br>",
"<br>等身大シューティングスター (실물 크기 슈팅스타)</br>",
"<br>ぎゅっと！ (꽉!)</br>",
"<br>シュワラブ (슈와 러브)</br>",
"<br>のーてんきのススメ (천진난만 권유)</br>",
"<br>はじめて愛デビュー！ (처음 사랑 데뷔!)</br>",
"<br>ときめきイルミネイト (두근두근 일루미네이트)</br>",
"<br>ホワイトモノローグ (화이트 모놀로그)</br>",
"<br>ゆめいろキャンバス (꿈빛 캔버스)</br>"
);
//*********************************************************

var lstMember = new Array();
var parent = new Array();
var equal = new Array();
var rec = new Array();
var cmp1,cmp2;
var head1,head2;
var nrec;

var numQuestion;
var totalSize;
var finishSize;
var finishFlag;

//변수 초기화
function initList(){
  var n = 0;
  var mid;
  var i;

  lstMember[n] = new Array();
  for (i=0; i<namMember.length; i++) {
    lstMember[n][i] = i;
  }
  parent[n] = -1;
  totalSize = 0;
  n++;

  for (i=0; i<lstMember.length; i++) {
    if(lstMember[i].length>=2) {
      mid = Math.ceil(lstMember[i].length/2);
      lstMember[n] = new Array();
      lstMember[n] = lstMember[i].slice(0,mid);
      totalSize += lstMember[n].length;
      parent[n] = i;
      n++;
      lstMember[n] = new Array();
      lstMember[n] = lstMember[i].slice(mid,lstMember[i].length);
      totalSize += lstMember[n].length;
      parent[n] = i;
      n++;
    }
  }

  for (i=0; i<namMember.length; i++) {
    rec[i] = 0;
  }
  nrec = 0;

  for (i=0; i<=namMember.length; i++) {
    equal[i] = -1;
  }

  cmp1 = lstMember.length-2;
  cmp2 = lstMember.length-1;
  head1 = 0;
  head2 = 0;
  numQuestion = 1;
  finishSize = 0;
  finishFlag = 0;
}

//리스트 업데이트
function sortList(flag){
  var i;
  var str;

  if (flag<0) {
    rec[nrec] = lstMember[cmp1][head1];
    head1++;
    nrec++;
    finishSize++;
    while (equal[rec[nrec-1]]!=-1) {
      rec[nrec] = lstMember[cmp1][head1];
      head1++;
      nrec++;
      finishSize++;
    }
  }
  else if (flag>0) {
    rec[nrec] = lstMember[cmp2][head2];
    head2++;
    nrec++;
    finishSize++;
    while (equal[rec[nrec-1]]!=-1) {
      rec[nrec] = lstMember[cmp2][head2];
      head2++;
      nrec++;
      finishSize++;
    }
  }
  else {
    rec[nrec] = lstMember[cmp1][head1];
    head1++;
    nrec++;
    finishSize++;
    while (equal[rec[nrec-1]]!=-1) {
      rec[nrec] = lstMember[cmp1][head1];
      head1++;
      nrec++;
      finishSize++;
    }
    equal[rec[nrec-1]] = lstMember[cmp2][head2];
    rec[nrec] = lstMember[cmp2][head2];
    head2++;
    nrec++;
    finishSize++;
    while (equal[rec[nrec-1]]!=-1) {
      rec[nrec] = lstMember[cmp2][head2];
      head2++;
      nrec++;
      finishSize++;
    }
  }

  if (head1<lstMember[cmp1].length && head2==lstMember[cmp2].length) {
    while (head1<lstMember[cmp1].length){
      rec[nrec] = lstMember[cmp1][head1];
      head1++;
      nrec++;
      finishSize++;
    }
  }
  else if (head1==lstMember[cmp1].length && head2<lstMember[cmp2].length) {
    while (head2<lstMember[cmp2].length){
      rec[nrec] = lstMember[cmp2][head2];
      head2++;
      nrec++;
      finishSize++;
    }
  }

  if (head1==lstMember[cmp1].length && head2==lstMember[cmp2].length) {
    for (i=0; i<lstMember[cmp1].length+lstMember[cmp2].length; i++) {
      lstMember[parent[cmp1]][i] = rec[i];
    }
    lstMember.pop();
    lstMember.pop();
    cmp1 = cmp1-2;
    cmp2 = cmp2-2;
    head1 = 0;
    head2 = 0;

    if (head1==0 && head2==0) {
      for (i=0; i<namMember.length; i++) {
        rec[i] = 0;
      }
      nrec = 0;
    }
  }

  if (cmp1<0) {
    str = "Battle No."+(numQuestion-1)+"<br>"+Math.floor(finishSize*100/totalSize)+"% sorted.";
    document.getElementById("battleNumber").innerHTML = str;

    showResult();
    finishFlag = 1;
  }
  else {
    showImage();
  }
}

//결과 표시
function showResult() {
  var ranking = 1;
  var sameRank = 1;
  var str = "";
  var i;

  str += "<table style=\"width: 300px; font-size: 14px; line-height: 140%; margin-left:auto; margin-right:auto; border:1px solid #000; border-collapse:collapse; background-color: #e6f2ff;\">";
  str += "<tr><th style=\"color:#000; background-color:#9ac4ff; text-align:center; padding: 8px;\">순위</th><th style=\"color:#000; background-color:#9ac4ff; text-align:center; padding: 8px;\">노래 제목</th></tr>";

  for (i=0; i<namMember.length; i++) {
    str += "<tr><td style=\"border:1px solid #000; text-align:right; padding-right:8px;\">" + ranking + "</td><td style=\"border:1px solid #000; padding-left:8px;\">" + namMember[lstMember[0][i]] + "</td></tr>";
    if (i<namMember.length-1) {
      if (equal[lstMember[0][i]]==lstMember[0][i+1]) {
        sameRank++;
      } else {
        ranking += sameRank;
        sameRank = 1;
      }
    }
  }
  str += "</table>";

  document.getElementById("resultField").innerHTML = str;
}

//비교 대상 표시
function showImage() {
  var str0 = "Battle No." + numQuestion + "<br>" + Math.floor(finishSize*100/totalSize) + "% sorted.";
  var str1 = toNameFace(lstMember[cmp1][head1]);
  var str2 = toNameFace(lstMember[cmp2][head2]);

  document.getElementById("battleNumber").innerHTML = str0;
  document.getElementById("leftField").innerHTML = str1;
  document.getElementById("rightField").innerHTML = str2;

  numQuestion++;
}

//인덱스 → 이름 변환 함수
function toNameFace(n){
  var str = namMember[n];
  return str;
}
</script>

  <h2 style="color:#0b61f3; margin-top: 30px;">아오키미 노래 소트 あおキミうたソート</h2>

    <div id="leftField" onclick="if(finishFlag==0)sortList(-1);"></div>
